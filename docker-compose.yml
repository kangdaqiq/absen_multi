services:
  app:
    image: ghcr.io/kangdaqiq/absen-multi:latest
    container_name: absen_app
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      whatsapp:
        condition: service_started
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs

  mysql:
    image: mysql:8.0
    container_name: absen_mysql
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=128M
      --max_connections=50
      --key_buffer_size=16M
      --slow_query_log=1
      --long_query_time=2
    environment:
      MYSQL_DATABASE: absen_sell
      MYSQL_USER: absen_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "absen_user", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go WhatsApp API (GOWA) ──────────────────────────────────────────────
  # RAM usage: ~15-30 MB (vs Node.js ~150-200 MB)
  # Image: https://hub.docker.com/r/aldinokemal2104/go-whatsapp-web-multidevice
  whatsapp:
    image: aldinokemal2104/go-whatsapp-web-multidevice:latest
    container_name: absen_whatsapp
    restart: unless-stopped
    # Port 3001 exposed hanya untuk scan QR dari browser
    # Jangan expose ke internet — hanya perlu untuk setup awal
    ports:
      - "127.0.0.1:3001:3000"   # localhost only — buka via SSH tunnel saat scan QR
    environment:
      - BASIC_AUTH_CREDENTIAL=${WA_API_USER:-admin}:${WA_API_PASS:-changeme}
      - APP_PORT=3000
      - APP_OS=AbsensiSekolah
    volumes:
      - wa_data:/app/storages   # session WA tersimpan permanen
    # Tidak perlu expose ke internet, app mengakses via internal network: http://whatsapp:3000

volumes:
  mysql_data:
  app_storage:
  app_logs:
  wa_data:       # ← session WhatsApp client tersimpan di sini
