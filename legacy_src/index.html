<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="1.5; url=login.php" />
  <title>Mengarahkan ke Login — Sistem Absensi</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
  <style>
    /* Modern, minimal landing that redirects to login.php */
    :root{--bg1:#0f172a;--bg2:#0b1220;--card:#0f172a;--accent:#7c3aed;--muted:#9aa4b2}
    html,body{height:100%;margin:0;font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#fff}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));backdrop-filter:blur(6px);border-radius:18px;padding:28px;max-width:720px;width:100%;box-shadow:0 10px 40px rgba(2,6,23,0.6);display:flex;gap:20px;align-items:center}
    .brand{display:flex;gap:16px;align-items:center}
    .logo{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;box-shadow:0 6px 20px rgba(124,58,237,0.25)}
    .meta{flex:1}
    h1{margin:0;font-size:20px}
    p{margin:6px 0 0 0;color:var(--muted);font-size:14px}
    .actions{display:flex;gap:10px;margin-top:14px}
    .btn{padding:10px 14px;border-radius:12px;border:0;cursor:pointer;font-weight:600}
    .btn.primary{background:linear-gradient(90deg,#4f46e5,#7c3aed);color:white}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.92)}
    .spinner{width:58px;height:58px;border-radius:50%;display:grid;place-items:center}
    .ring{width:40px;height:40px;border-radius:50%;border:4px solid transparent;border-top-color:#fff;animation:spin 1s linear infinite;opacity:0.95}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media (max-width:700px){
      .card{flex-direction:column;align-items:flex-start}
      .logo{width:56px;height:56px}
      .spinner{order:2;margin-top:8px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="status" aria-live="polite">
      <div class="brand">
        <div class="logo">SI</div>
      </div>

      <div class="meta">
        <h1>Mengarahkan ke halaman Login…</h1>
        <p>Anda akan segera diarahkan ke halaman login. Jika tidak otomatis, klik tombol di bawah.</p>

        <div class="actions">
          <button class="btn primary" id="go">Buka Login Sekarang</button>
        </div>
      </div>

      <div class="spinner" aria-hidden="true">
        <div class="ring"></div>
      </div>
    </div>
  </div>

  <noscript>
    <div style="position:fixed;left:0;right:0;bottom:12px;margin:auto;max-width:720px;background:#1f2937;color:#fff;padding:12px;border-radius:10px;text-align:center">Untuk melanjutkan, aktifkan JavaScript atau klik <a href="login.php" style="color:#a78bfa;font-weight:700">di sini</a>.</div>
  </noscript>

  <script>
    // Modern JS redirect with fallback to meta refresh. Uses replace() so history doesn't keep index.
    const redirect = () => window.location.replace('login.php');
    // Redirect after short delay for better UX (1.5s). Keep consistent with meta refresh.
    const timer = setTimeout(redirect, 1500);

    // Immediate redirect when user clicks primary button.
    document.getElementById('go').addEventListener('click', ()=>{
      clearTimeout(timer);
      redirect();
    });

    // Accessibility: announce redirect in 1.5s
    const status = document.querySelector('[role="status"]');
    if(status){ status.setAttribute('aria-label','Mengalihkan ke halaman login dalam satu setengah detik'); }
  </script>
</body>
</html>
